<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Flip Clock">
	<title>Flip Clock</title>
	<defs>
		<linearGradient id="fav-case" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#7a7a7a"/>
			<stop offset="55%" stop-color="#4a4a4a"/>
			<stop offset="100%" stop-color="#2e2e2e"/>
		</linearGradient>
		<linearGradient id="fav-dial" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" stop-color="#2a2a2a"/>
			<stop offset="50%" stop-color="#1a1a1a"/>
			<stop offset="100%" stop-color="#252525"/>
		</linearGradient>
		<linearGradient id="fav-seam" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" stop-color="rgba(18,124,2,0.35)"/>
			<stop offset="50%" stop-color="rgba(255,255,255,0.08)"/>
			<stop offset="100%" stop-color="rgba(18,124,2,0.25)"/>
		</linearGradient>
	</defs>
	<!-- Watch case -->
	<circle cx="16" cy="16" r="14.5" fill="url(#fav-case)" stroke="#1f1f1f" stroke-width="0.75"/>
	<circle cx="16" cy="16" r="12" fill="url(#fav-dial)" stroke="#127c02" stroke-width="0.85" opacity="0.95"/>
	<!-- Flip-clock seam (horizontal split) -->
	<rect x="5" y="15.25" width="22" height="1.5" fill="url(#fav-seam)" rx="0.5"/>
	<!-- Crown -->
	<rect x="28.5" y="13.5" width="2.25" height="5" rx="0.6" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="0.35"/>
	<!-- Hour + minute hands (classic ~10:10) -->
	<g transform="translate(16 16)">
		<line x1="0" y1="0" x2="0" y2="-5.2" stroke="#127c02" stroke-width="2.25" stroke-linecap="round" transform="rotate(305)"/>
		<line x1="0" y1="0" x2="0" y2="-8.2" stroke="#6ecf5a" stroke-width="1.35" stroke-linecap="round" transform="rotate(60)" opacity="0.95"/>
		<circle r="1.35" fill="#0d5a04" stroke="#1a1a1a" stroke-width="0.35"/>
	</g>
</svg>
